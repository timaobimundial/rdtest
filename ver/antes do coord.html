<script>
  function verificarPeriodo() {
    const agora = new Date();
    const diaSemana = agora.getDay(); // Dia da semana local
    const hora = agora.getHours().toString().padStart(2, '0');
    const minuto = agora.getMinutes().toString().padStart(2, '0');
    const horaAtual = hora + minuto;

    // Data limite: 02/10/2025 00:00 local
    const dataFinal = new Date(2025, 9, 2, 0, 0); // mês 9 = outubro
    if (agora.getTime() >= dataFinal.getTime()) {
      document.getElementById('saida').innerHTML = '';
      return;
    }

    let periodos = [
      { inicio: '0415', fim: '0800' },
      { inicio: '0900', fim: '1150' },
      { inicio: '2345', fim: '0245' }
    ];

    // Alterar o primeiro período apenas nas terças-feiras
    if (diaSemana === 2) { // terça-feira local
      periodos[0] = { inicio: '0440', fim: '0755' };
    }

    function dentroDoPeriodo(p) {
      if (p.inicio <= p.fim) {
        return horaAtual >= p.inicio && horaAtual <= p.fim;
      } else {
        return horaAtual >= p.inicio || horaAtual <= p.fim;
      }
    }

    const texto = 'SBUL CLSD';
    let resultado = `<span class="texto-principal">${texto}</span> `;

    for (let i = 0; i < periodos.length; i++) {
      const periodo = periodos[i];
      const periodoStr = `${periodo.inicio}-${periodo.fim}`;
      if (dentroDoPeriodo(periodo)) {
        resultado += `<span class="periodo ativo">${periodoStr}</span> `;
      } else {
        resultado += `<span class="periodo inativo">${periodoStr}</span> `;
      }
    }

    document.getElementById('saida').innerHTML = resultado.trim();
  }

  document.addEventListener('DOMContentLoaded', verificarPeriodo);
</script>





<script>
  function verificarPeriodo() {
    const agora = new Date();
    const hora = agora.getUTCHours().toString().padStart(2, '0');
    const minuto = agora.getUTCMinutes().toString().padStart(2, '0');
    const horaAtual = hora + minuto;

    // Data limite: 22/02/2026 08:00 UTC
    const dataFinal = new Date(Date.UTC(2026, 1, 22, 8, 0)); // mês 1 = fevereiro
    if (agora.getTime() >= dataFinal.getTime()) {
      document.getElementById('aviso_ur').innerHTML = '';
      return;
    }

    const periodo = { inicio: '2345', fim: '0800' };

    function dentroDoPeriodo(p) {
      if (p.inicio <= p.fim) {
        return horaAtual >= p.inicio && horaAtual <= p.fim;
      } else {
        return horaAtual >= p.inicio || horaAtual <= p.fim;
      }
    }

    const texto = 'SBUR CLSD';
    let resultado = `<span class="texto-principal">${texto}</span> `;

    const periodoStr = `${periodo.inicio}-${periodo.fim}`;
    if (dentroDoPeriodo(periodo)) {
      resultado += `<span class="periodo ativo">${periodoStr}</span> `;
    } else {
      resultado += `<span class="periodo inativo">${periodoStr}</span> `;
    }

    document.getElementById('aviso_ur').innerHTML = resultado.trim();
  }

  document.addEventListener('DOMContentLoaded', verificarPeriodo);
</script>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('https://aisweb.decea.mil.br/api/?apiKey=1505393075&apiPass=1f301b84-0a7c-11ed-9f5b-0050569ac2e1&area=sol&icaoCode=sbur'); // Substitua pela URL da sua API
                const xmlText = await response.text();
                
                // Criar um parser para o XML
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                // Extrair os dados desejados
                const date = xmlDoc.getElementsByTagName('date')[0].textContent;
                const sunrise = xmlDoc.getElementsByTagName('sunrise')[0].textContent;
                const sunset = xmlDoc.getElementsByTagName('sunset')[0].textContent;

                // Formatar a data para DD/MM/AAAA
                const formattedDate = date.split('-').reverse().join('/');

                // Atualizar o DOM com os dados
                document.getElementById('date').textContent = formattedDate;
                document.getElementById('sunrise').textContent = sunrise;
                document.getElementById('sunset').textContent = sunset;
            } catch (error) {
                console.error('Erro ao buscar dados:', error);
            }
        }

        // Chamar a função para buscar os dados ao carregar a página
        fetchData();
    </script>
